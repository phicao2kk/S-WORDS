<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Tiến trình học</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow">
                    <i class="fas fa-chart-line text-purple-600 text-xl"></i>
                </div>
                <h1 class="text-2xl font-black text-white">📊 Bảng điều khiển</h1>
            </div>
            <a href="index.html" class="stat-badge rounded-xl px-4 py-2 text-white hover:bg-white/30 transition">
                <i class="fas fa-arrow-left mr-1"></i> Quay lại
            </a>
        </div>

        <!-- Thống kê -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass-modern p-6 text-center">
                <i class="fas fa-database text-3xl text-indigo-500 mb-2"></i>
                <div class="text-3xl font-bold text-gray-800" id="totalWords">0</div>
                <div class="text-sm text-gray-500">Tổng số từ</div>
            </div>
            <div class="glass-modern p-6 text-center">
                <i class="fas fa-check-circle text-3xl text-green-500 mb-2"></i>
                <div class="text-3xl font-bold text-gray-800" id="learnedWords">0</div>
                <div class="text-sm text-gray-500">Đã học</div>
            </div>
            <div class="glass-modern p-6 text-center">
                <i class="fas fa-fire-flame text-3xl text-orange-500 mb-2"></i>
                <div class="text-3xl font-bold text-gray-800" id="memoryRate">0%</div>
                <div class="text-sm text-gray-500">Tỉ lệ nhớ</div>
            </div>
        </div>

        <!-- Biểu đồ tiến độ -->
        <div class="glass-modern p-6">
            <div id="progressChart" class="chart">
                <!-- Biểu đồ sẽ hiển thị ở đây -->
            </div>
        </div>
    </div>

    <!-- THỨ TỰ SCRIPT QUAN TRỌNG: vocab-data.js TRƯỚC, dashboard.js SAU -->
    <script src="vocab-data.js"></script>
    <script src="js/wrong-words-manager.js"></script>  <!-- 👈 THÊM DÒNG NÀY -->
    <script src="js/dashboard.js"></script>
</body>
</html>
