<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập câu sai · S-WORDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow">
                    <i class="fas fa-exclamation-triangle text-orange-500 text-xl"></i>
                </div>
                <h1 class="text-2xl font-black text-white">📝 Ôn tập câu sai</h1>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="stat-badge rounded-xl px-4 py-2 text-white hover:bg-white/30 transition">
                    <i class="fas fa-arrow-left mr-1"></i> Quay lại
                </a>
            </div>
        </div>

        <!-- Thống kê từ sai -->
        <div class="glass-modern p-6 mb-8">
            <div class="flex justify-between items-center flex-wrap gap-4">
                <div>
                    <div class="text-sm text-gray-500">Tổng số từ cần ôn tập</div>
                    <div class="text-4xl font-bold text-gray-800" id="totalWrongCount">0</div>
                </div>
                <div class="flex gap-3">
                    <select id="topicFilter" class="input-modern p-3 rounded-xl border-2 border-gray-200 focus:border-indigo-400 outline-none bg-white">
                        <option value="all">📋 Tất cả chủ đề</option>
                    </select>
                    <button id="clearAllBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-5 rounded-xl transition-all">
                        <i class="fas fa-trash-alt mr-1"></i> Xóa tất cả
                    </button>
                </div>
            </div>
        </div>

        <!-- Card ôn tập chính -->
        <div class="glass-modern p-6 md:p-10 word-card mb-8">
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Bên trái: tiếng Việt -->
                <div class="text-center md:text-left space-y-6">
                    <div class="inline-block px-4 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-black uppercase tracking-wider">
                        <i class="fas fa-repeat mr-1"></i> TỪ ĐÃ SAI
                    </div>
                    <div>
                        <div class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-2">🇻🇳 Nghĩa tiếng Việt</div>
                        <div id="vietnameseWord" class="text-5xl md:text-6xl font-extrabold text-gray-800 mt-2 leading-tight break-words">
                            ---
                        </div>
                    </div>
                    <div class="flex justify-center md:justify-start gap-3">
                        <button id="speakBtn" class="bg-gray-100 hover:bg-gray-200 w-12 h-12 rounded-full flex items-center justify-center text-indigo-600 transition-all shadow-md">
                            <i class="fas fa-volume-up text-xl"></i>
                        </button>
                        <div id="wrongCountInfo" class="bg-gray-100 px-4 py-2 rounded-full text-sm text-gray-600">
                            <i class="fas fa-fire mr-1 text-orange-500"></i> Đã sai: <span id="wrongCountValue">0</span> lần
                        </div>
                    </div>
                </div>

                <!-- Bên phải: Ô nhập & kết quả -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-gray-600 font-bold text-sm uppercase tracking-wider mb-2">
                            ✍️ Viết bằng tiếng Anh
                        </label>
                        <div class="relative">
                            <input type="text" id="answerInput" placeholder="Nhập đáp án đúng..." 
                                class="input-modern w-full p-5 text-lg font-medium border-2 border-gray-200 rounded-2xl focus:border-indigo-400 focus:outline-none transition-all pr-28">
                            <button id="checkBtn" class="btn-primary absolute right-2 top-2 bottom-2 px-6 rounded-xl text-white font-bold text-sm shadow-lg">
                                KIỂM TRA
                            </button>
                        </div>
                    </div>

                    <!-- Kết quả -->
                    <div id="resultArea" class="rounded-2xl p-4 transition-all min-h-[100px]"></div>

                    <!-- Nút tiếp theo / hoàn thành -->
                    <button id="nextBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3 text-lg shadow-xl">
                        <i class="fas fa-arrow-right"></i> TỪ TIẾP THEO
                    </button>
                </div>
            </div>
        </div>

        <!-- Danh sách tất cả từ sai -->
        <div class="glass-modern p-6">
            <h2 class="text-sm font-black text-gray-600 uppercase tracking-wider mb-4 flex items-center gap-2">
                <i class="fas fa-list-ul text-orange-500"></i> DANH SÁCH TỪ CẦN ÔN
            </h2>
            <div id="wrongWordsList" class="space-y-2 max-h-[400px] overflow-y-auto">
                <!-- JS sẽ đổ dữ liệu vào đây -->
                <div class="text-center text-gray-400 py-8">Chưa có từ nào sai. Học tập chăm chỉ nhé! 🎉</div>
            </div>
        </div>
    </div>

    <script src="vocab-data.js"></script>
    <script src="js/wrong-words-manager.js"></script>
    <script src="js/wrong-words.js"></script>
</body>
</html>
